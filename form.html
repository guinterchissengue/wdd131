<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit reviews for smart home products with rating, date, features, and comments.">
    <!-- Meta author -->
    <meta name="author" content="Guinter Chissengue">
    <!-- External CSS file -->
    <link rel="stylesheet" href="styles/styles.css">
    <title>Product Review Form</title>
    <!-- External JS -->
    <script src="scripts/script.js" defer></script>
</head>
<body>

<header>
    <!-- Main page heading -->
    <h1>Product Review Form</h1>
</header>

<!-- Review form -->
<form method="get" action="review.html" id="reviewForm">

    <!-- Product Name select -->
    <label for="product">Product Name <span class="required">*</span></label>
    <select id="product" name="product" required>
        <!-- Placeholder option -->
        <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- Overall Rating using radio buttons -->
    <label>Overall Rating <span class="required">*</span></label>
    <div class="rating">
        <input type="radio" id="star5" name="rating" value="5" required>
        <label for="star5">&#9733;</label>

        <input type="radio" id="star4" name="rating" value="4" required>
        <label for="star4">&#9733;</label>

        <input type="radio" id="star3" name="rating" value="3" required>
        <label for="star3">&#9733;</label>

        <input type="radio" id="star2" name="rating" value="2" required>
        <label for="star2">&#9733;</label>

        <input type="radio" id="star1" name="rating" value="1" required>
        <label for="star1">&#9733;</label>
    </div>

    <!-- Date of Installation input -->
    <label for="date">Date of Installation <span class="required">*</span></label>
    <input type="date" id="date" name="date" required>

    <!-- Useful Features checkboxes -->
    <label>Useful Features</label>
    <div class="checkbox-group">
        <input type="checkbox" id="feature1" name="features" value="Easy Setup">
        <label for="feature1">Easy Setup</label>

        <input type="checkbox" id="feature2" name="features" value="Remote Control">
        <label for="feature2">Remote Control</label>

        <input type="checkbox" id="feature3" name="features" value="Energy Efficient">
        <label for="feature3">Energy Efficient</label>

        <input type="checkbox" id="feature4" name="features" value="Smart Integration">
        <label for="feature4">Smart Integration</label>
    </div>

    <!-- Written Review textarea -->
    <label for="review">Written Review</label>
    <textarea id="review" name="review"></textarea>

    <!-- User Name input (optional) -->
    <label for="username">Your Name</label>
    <input type="text" id="username" name="username">

    <!-- Submit button -->
    <input type="submit" value="Submit Review">
</form>

<footer>
    <!-- Footer content -->
    <p>&copy; © 2026 Product Reviews</p>
</footer>

</body>
</html>
