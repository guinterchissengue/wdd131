<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product Review Form for smart home devices">
    <meta name="author" content="Guinter Chissengue">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/script.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            
            <!-- Product -->
            <label for="product">Product Name <span class="required">*</span></label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <!-- Rating - CADA radio com seu label -->
            <fieldset>
                <legend>Overall Rating *</legend>
                <label for="r1">
                    <input type="radio" id="r1" name="rating" value="1" required>
                    1
                </label>
                <label for="r2">
                    <input type="radio" id="r2" name="rating" value="2" required>
                    2
                </label>
                <label for="r3">
                    <input type="radio" id="r3" name="rating" value="3" required>
                    3
                </label>
                <label for="r4">
                    <input type="radio" id="r4" name="rating" value="4" required>
                    4
                </label>
                <label for="r5">
                    <input type="radio" id="r5" name="rating" value="5" required>
                    5
                </label>
            </fieldset>

            <!-- Date -->
            <label for="date">Date of Installation <span class="required">*</span></label>
            <input type="date" id="date" name="date" required>

            <!-- Features - CADA checkbox com seu label -->
            <fieldset>
                <legend>Useful Features</legend>
                <label for="f1">
                    <input type="checkbox" id="f1" name="features" value="Easy Setup">
                    Easy Setup
                </label>
                <label for="f2">
                    <input type="checkbox" id="f2" name="features" value="Remote Control">
                    Remote Control
                </label>
                <label for="f3">
                    <input type="checkbox" id="f3" name="features" value="Energy Efficient">
                    Energy Efficient
                </label>
                <label for="f4">
                    <input type="checkbox" id="f4" name="features" value="Smart Integration">
                    Smart Integration
                </label>
            </fieldset>

            <!-- Review -->
            <label for="review">Written Review</label>
            <textarea id="review" name="review"></textarea>

            <!-- Name -->
            <label for="username">Your Name</label>
            <input type="text" id="username" name="username">

            <!-- Submit -->
            <input type="submit" value="Submit Review">

        </form>
    </main>

    <footer>
        <p>&copy; BYU - Pathway 2026 Product Reviews</p>
    </footer>
</body>
</html>
