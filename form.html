<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Create and submit detailed reviews 
    for smart home products including ratings, installation date, 
    features, and written feedback in a responsive form.">
    <meta name="author" content=" Guinter Chissengue">

    <title>Product Review Form</title>

    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/script.js" defer></script>
</head>

<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>

<form method="get" action="review.html">

    <!-- Product -->
    <label for="product">Product Name <span class="required">*</span></label>
    <select id="product" name="product" required>
        <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- Rating -->
    <fieldset>
        <legend>Overall Rating *</legend>

        <label>
            <input type="radio" id="r1" name="rating" value="1" required>
            1
        </label>

        <label>
            <input type="radio" id="r2" name="rating" value="2">
            2
        </label>

        <label>
            <input type="radio" id="r3" name="rating" value="3">
            3
        </label>

        <label>
            <input type="radio" id="r4" name="rating" value="4">
            4
        </label>

        <label>
            <input type="radio" id="r5" name="rating" value="5">
            5
        </label>
    </fieldset>

    <!-- Date -->
    <label for="date">Date of Installation *</label>
    <input type="date" id="date" name="date" required>

    <!-- Features -->
    <fieldset>
        <legend>Useful Features</legend>

        <label><input type="checkbox" name="features" value="Easy Setup"> Easy Setup</label>
        <label><input type="checkbox" name="features" value="Remote Control"> Remote Control</label>
        <label><input type="checkbox" name="features" value="Energy Efficient"> Energy Efficient</label>
        <label><input type="checkbox" name="features" value="Smart Integration"> Smart Integration</label>
    </fieldset>

    <!-- Review -->
    <label for="review">Written Review</label>
    <textarea id="review" name="review"></textarea>

    <!-- Name -->
    <label for="username">Your Name</label>
    <input type="text" id="username" name="username">

    <!-- Submit -->
    <input type="submit" value="Submit Review">

</form>

</main>

<footer>
    <p>&copy; BYU - Pathway 2026 Product Reviews</p>
</footer>

</body>
</html>
