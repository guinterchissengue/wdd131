<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product review form for smart home products.">
    <meta name="author" content="Seu Nome">
    <link rel="stylesheet" href="styles.css">
    <title>Product Review Form</title>
</head>
<body>

<header>
    <h1>Product Review Form</h1>
</header>

<form method="get" action="review.html" id="reviewForm">

    <!-- Product Name -->
    <label for="product">Product Name <span style="color:red">*</span></label>
    <select id="product" name="product" required>
        <option disabled selected>Select a Product ...</option>
    </select>

    <!-- Overall Rating -->
    <label>Overall Rating <span style="color:red">*</span></label>
    <div class="rating">
        <input type="radio" id="star5" name="rating" value="5" required><label for="star5">&#9733;</label>
        <input type="radio" id="star4" name="rating" value="4"><label for="star4">&#9733;</label>
        <input type="radio" id="star3" name="rating" value="3"><label for="star3">&#9733;</label>
        <input type="radio" id="star2" name="rating" value="2"><label for="star2">&#9733;</label>
        <input type="radio" id="star1" name="rating" value="1"><label for="star1">&#9733;</label>
    </div>

    <!-- Date of Installation -->
    <label for="date">Date of Installation <span style="color:red">*</span></label>
    <input type="date" id="date" name="date" required>

    <!-- Useful Features -->
    <label>Useful Features</label>
    <div class="checkbox-group">
        <input type="checkbox" id="feature1" name="features" value="Easy Setup">
        <label for="feature1">Easy Setup</label>

        <input type="checkbox" id="feature2" name="features" value="Remote Control">
        <label for="feature2">Remote Control</label>

        <input type="checkbox" id="feature3" name="features" value="Energy Efficient">
        <label for="feature3">Energy Efficient</label>

        <input type="checkbox" id="feature4" name="features" value="Smart Integration">
        <label for="feature4">Smart Integration</label>
    </div>

    <!-- Written Review -->
    <label for="review">Written Review</label>
    <textarea id="review" name="review"></textarea>

    <!-- User Name -->
    <label for="username">Guinter Chissengue</label>
    <input type="text" id="username" name="username">

    <input type="submit" value="Submit Review">
</form>

<footer>
    <p>&copy; © 2026 Product Reviews</p>
</footer>

<script src="script.js"></script>
</body>
</html>
