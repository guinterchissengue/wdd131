<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Confirmation page showing your submitted smart home product review details and total count.">
    <meta name="author" content="Guinter Chissengue">
    <title>Review Submitted - Thank You!</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1> Thank you for your review!</h1>
    </header>

    <main class="container">
        <div class="review-card">
            <h2>Your Review Summary</h2>
            
            <p><strong>Product:</strong> <span id="product-name">-</span></p>
            <p><strong>Rating:</strong> <span id="rating-display">-</span></p>
            <p><strong>Install Date:</strong> <span id="install-date">-</span></p>
            <p><strong>Features:</strong> <span id="features-list">-</span></p>
            <p><strong>Review:</strong> <span id="review-content">-</span></p>
            <p><strong>By:</strong> <span id="user-name">-</span></p>
        </div>

        <div class="stats">
            <p id="reviewCount">Total Reviews: 0</p>
        </div>

        <div class="actions">
            <a href="index.html" class="btn btn-primary">Write Another Review</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 BYU-Pathway Product Reviews</p>
    </footer>
</body>
</html>
