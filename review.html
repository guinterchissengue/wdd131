<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Confirmation page for submitted product reviews.">
    <meta name="author" content="Seu Nome">
    <link rel="stylesheet" href="styles.css">
    <title>Review Submitted</title>
</head>
<body>

<header>
    <h1>Thank You for Your Review!</h1>
</header>

<section>
    <p>Your review has been submitted successfully.</p>
    <p id="counter"></p>
</section>

<footer>
    <p>&copy;© 2026 Product Reviews</p>
</footer>

<script>
    // Increment counter in localStorage
    let count = localStorage.getItem('reviewCount') || 0;
    count = parseInt(count) + 1;
    localStorage.setItem('reviewCount', count);

    document.getElementById('counter').textContent = `Total reviews submitted: ${count}`;
</script>

</body>
</html>
