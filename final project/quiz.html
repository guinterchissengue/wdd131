<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Guinter Chissengue">
  <title>Quiz | PathFinder</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
  <h1>Career Quiz</h1>
</header>

<main>

<form id="quizForm">

  <!-- Using fieldset improves accessibility -->
  <fieldset class="question">
    <legend>1. What do you enjoy the most?</legend>
    <label><input type="radio" name="q1" value="tech"> Technology</label>
    <label><input type="radio" name="q1" value="business"> Business</label>
    <label><input type="radio" name="q1" value="health"> Helping people</label>
    <label><input type="radio" name="q1" value="creative"> Arts</label>
  </fieldset>

  <fieldset class="question">
    <legend>2. Which subject do you prefer?</legend>
    <label><input type="radio" name="q2" value="tech"> Math</label>
    <label><input type="radio" name="q2" value="business"> Economics</label>
    <label><input type="radio" name="q2" value="health"> Biology</label>
    <label><input type="radio" name="q2" value="creative"> Literature</label>
  </fieldset>

  <fieldset class="question">
    <legend>3. What kind of tasks do you enjoy?</legend>
    <label><input type="radio" name="q3" value="tech"> Problem-solving</label>
    <label><input type="radio" name="q3" value="business"> Leading people</label>
    <label><input type="radio" name="q3" value="health"> Caring for others</label>
    <label><input type="radio" name="q3" value="creative"> Creating things</label>
  </fieldset>

  <fieldset class="question">
    <legend>4. What describes you best?</legend>
    <label><input type="radio" name="q4" value="tech"> Logical</label>
    <label><input type="radio" name="q4" value="business"> Ambitious</label>
    <label><input type="radio" name="q4" value="health"> Empathetic</label>
    <label><input type="radio" name="q4" value="creative"> Imaginative</label>
  </fieldset>

  <fieldset class="question">
    <legend>5. Your ideal work environment?</legend>
    <label><input type="radio" name="q5" value="tech"> Tech Lab</label>
    <label><input type="radio" name="q5" value="business"> Corporate Office</label>
    <label><input type="radio" name="q5" value="health"> Hospital</label>
    <label><input type="radio" name="q5" value="creative"> Studio</label>
  </fieldset>

  <button type="submit">See Results</button>

</form>

</main>

<footer>
  <a href="references.html">References</a>
</footer>

<script src="js/script.js"></script>

</body>
</html>
